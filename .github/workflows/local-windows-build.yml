# RustDesk Windows 构建 workflow
# 使用方法：
# 1. Fork https://github.com/rustdesk/rustdesk 到你的 GitHub 账户
# 2. 将此文件放入你的 fork 的 .github/workflows 目录
# 3. 在 GitHub Actions 页面点击 "RustDesk Windows Build" workflow
# 4. 点击 "Run workflow" 运行

name: RustDesk Windows Build

on:
  workflow_dispatch:
    inputs:
      upload_tag:
        description: 'Release tag name (e.g., nightly, test-build)'
        required: false
        default: 'nightly'
      upload_artifact:
        description: 'Upload artifact to release'
        required: false
        default: 'true'
        type: boolean

jobs:
  build-windows:
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: ${{ inputs.upload_artifact }}
      upload-tag: ${{ inputs.upload_tag || 'nightly' }}