name: Build YhloVnc

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.4.8)'
        required: true
        default: '1.4.8'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: 3.24.5

      - name: Install LLVM
        run: |
          Write-Host "Downloading LLVM $env:LLVM_VERSION..."
          Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-win64.exe" -OutFile llvm.exe
          Write-Host "Installing LLVM..."
          Start-Process -Wait -FilePath .\llvm.exe -ArgumentList '/S'
          Remove-Item llvm.exe
          Write-Host "LLVM installed successfully"

      - name: Setup vcpkg
        run: |
          Write-Host "Setting up vcpkg..."
          if (-not (Test-Path "C:\vcpkg\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            git -C C:\vcpkg checkout $env:VCPKG_COMMIT
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          Write-Host "vcpkg setup complete"

      - name: Install vcpkg dependencies
        run: |
          Write-Host "Installing vcpkg dependencies (this may take 10-30 minutes)..."
          C:\vcpkg\vcpkg.exe install --triplet x64-windows-static
        timeout-minutes: 60

      - name: Build
        run: |
          Write-Host "Starting Rust + Flutter build..."
          python build.py --portable --flutter --skip-portable-pack --hwcodec
        env:
          VCPKG_ROOT: C:\vcpkg
        timeout-minutes: 60

      - name: Generate Installer
        run: |
          Write-Host "Generating installer..."
          if (Test-Path "flutter\build\windows\x64\runner\Release\YhloVnc.exe") {
            python libs\portable\generate.py -f flutter\build\windows\x64\runner\Release -o libs\portable -e flutter\build\windows\x64\runner\Release\YhloVnc.exe
            Write-Host "Installer generated successfully"
          } else {
            Write-Host "Warning: YhloVnc.exe not found"
            dir flutter\build\windows\x64\runner\Release\*.exe
          }

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YhloVnc-${{ inputs.version }}-windows-x64
          path: |
            target/release/*.exe
            target/release/yhlovnc-portable-packer.exe
            flutter/build/windows/x64/runner/Release/*.exe
          retention-days: 30

  build-deb:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-x11-dev \
            libgl1-mesa-dev libasound2-dev libpulse-dev libxdo-dev \
            libayatana-appindicator3-dev ninja-build clang cmake

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: 3.24.5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75

      - name: Build Linux
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release
        timeout-minutes: 45

      - name: Create tarball
        run: |
          mkdir -p output
          cp -r flutter/build/linux/x64/release/bundle/* output/
          tar -czvf YhloVnc-${{ inputs.version }}-linux-x64.tar.gz -C output .

      - name: Upload Linux artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YhloVnc-${{ inputs.version }}-linux-x64
          path: YhloVnc-${{ inputs.version }}-linux-x64.tar.gz
          retention-days: 30

  build-macos:
    runs-on: macos-13
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: 3.24.5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75

      - name: Build macOS
        run: |
          flutter config --enable-macos-desktop
          flutter build macos --release
        timeout-minutes: 45

      - name: Create tarball
        run: |
          mkdir -p output
          cp -r flutter/build/macos/Build/Products/Release/rustdesk.app output/
          tar -czvf YhloVnc-${{ inputs.version }}-macos-x64.tar.gz -C output .

      - name: Upload macOS artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YhloVnc-${{ inputs.version }}-macos-x64
          path: YhloVnc-${{ inputs.version }}-macos-x64.tar.gz
          retention-days: 30